<style>
  :root {
    --pd-primary: #292524;
    --pd-accent: #B45309;
    --pd-light: #F5F0E8;
    --pd-white: #ffffff;
    --pd-font-display: 'Barlow Condensed', sans-serif;
    --pd-font-body: 'Barlow', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .pd-header {
    position: sticky;
    top: 0;
    z-index: 1000;
    font-family: var(--pd-font-body);
    /* Safety net: if any child ever forces extra width again, clip it here
       instead of letting it push the whole page into horizontal scroll. */
    max-width: 100vw;
    overflow-x: hidden;
  }

  /* ── Top Bar ── */
  .pd-topbar {
    background: var(--pd-primary);
    border-bottom: 2px solid var(--pd-accent);
    padding: 0 1.25rem;
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .pd-topbar__tagline {
    font-family: var(--pd-font-display);
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--pd-light);
    white-space: nowrap;
  }

  .pd-topbar__right {
    display: flex;
    align-items: center;
    gap: 1rem;
    min-width: 0;
  }

  .pd-topbar__phone {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    font-family: var(--pd-font-display);
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--pd-light);
    text-decoration: none;
    white-space: nowrap;
    transition: color 0.2s;
  }

  .pd-topbar__phone:hover { color: var(--pd-accent); }
  .pd-topbar__phone svg { flex-shrink: 0; }

  .pd-topbar__socials {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  .pd-topbar__socials a {
    display: flex;
    align-items: center;
    color: var(--pd-light);
    opacity: 0.75;
    transition: opacity 0.2s, color 0.2s;
  }

  .pd-topbar__socials a:hover {
    opacity: 1;
    color: var(--pd-accent);
  }

  /* ── Main Bar ── */
  .pd-mainbar {
    background: var(--pd-white);
    border-bottom: 3px solid var(--pd-primary);
    padding: 0 1.25rem;
    min-height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  /* Logo — allowed to shrink/wrap so it can never force the header wider
     than the viewport. This was the cause of the horizontal-scroll bug:
     flex-shrink:0 locked it at its full un-wrapped width. */
  .pd-logo {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    text-decoration: none;
    min-width: 0;
    flex-shrink: 1;
  }

  .pd-logo img {
    height: 100px;
    width: auto;
    display: block;
    flex-shrink: 0;
  }

  .pd-logo__text {
    font-family: var(--pd-font-display);
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--pd-primary);
    line-height: 1.1;
    min-width: 0;
    overflow-wrap: break-word;
  }

  .pd-logo__text span {
    display: block;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--pd-accent);
    white-space: normal;
  }

  /* Nav */
  .pd-nav {
    display: flex;
    align-items: center;
    gap: 0.15rem;
    list-style: none;
  }

  .pd-nav a {
    font-family: var(--pd-font-display);
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--pd-primary);
    text-decoration: none;
    padding: 0.4rem 0.65rem;
    border-radius: 4px;
    transition: background 0.18s, color 0.18s;
    white-space: nowrap;
  }

  .pd-nav a:hover,
  .pd-nav a[aria-current="page"] {
    background: var(--pd-primary);
    color: var(--pd-white);
  }

  /* CTA Button */
  .pd-header-cta {
    display: inline-block;
    font-family: var(--pd-font-display);
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--pd-white);
    background: var(--pd-accent);
    border: 2px solid var(--pd-accent);
    border-radius: 4px;
    padding: 0.5rem 1.2rem;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }

  .pd-header-cta:hover {
    background: var(--pd-primary);
    border-color: var(--pd-primary);
    color: var(--pd-white);
  }

  /* Hamburger */
  .pd-hamburger {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    background: none;
    border: 2px solid var(--pd-primary);
    border-radius: 4px;
    padding: 0.4rem 0.5rem;
    cursor: pointer;
    flex-shrink: 0;
    min-width: 44px;
    min-height: 44px;
  }

  .pd-hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--pd-primary);
    border-radius: 2px;
    transition: transform 0.25s, opacity 0.25s;
  }

  .pd-hamburger[aria-expanded="true"] span:nth-child(1) {
    transform: translateY(7px) rotate(45deg);
  }
  .pd-hamburger[aria-expanded="true"] span:nth-child(2) {
    opacity: 0;
  }
  .pd-hamburger[aria-expanded="true"] span:nth-child(3) {
    transform: translateY(-7px) rotate(-45deg);
  }

  /* Mobile Nav Drawer */
  .pd-mobile-nav {
    display: none;
    background: var(--pd-primary);
    padding: 1rem 1.25rem 1.25rem;
    border-top: 2px solid var(--pd-accent);
  }

  .pd-mobile-nav.is-open { display: block; }

  .pd-mobile-nav ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    margin-bottom: 1rem;
  }

  .pd-mobile-nav ul a {
    display: block;
    font-family: var(--pd-font-display);
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--pd-light);
    text-decoration: none;
    padding: 0.65rem 0.75rem;
    border-radius: 4px;
    transition: background 0.18s, color 0.18s;
  }

  .pd-mobile-nav ul a:hover {
    background: var(--pd-accent);
    color: var(--pd-white);
  }

  .pd-mobile-nav__cta {
    display: block;
    font-family: var(--pd-font-display);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--pd-white);
    background: var(--pd-accent);
    border: 2px solid var(--pd-accent);
    border-radius: 4px;
    padding: 0.75rem 1rem;
    text-decoration: none;
    text-align: center;
    transition: background 0.2s, color 0.2s;
  }

  .pd-mobile-nav__cta:hover {
    background: transparent;
    color: var(--pd-accent);
  }

  /* Focus visibility */
  .pd-header a:focus-visible,
  .pd-header button:focus-visible {
    outline: 2px solid var(--pd-accent);
    outline-offset: 2px;
  }

  /* ── Responsive ── */
  @media (max-width: 767px) {
    .pd-topbar__tagline { display: none; }
    .pd-nav, .pd-header-cta { display: none; }
    .pd-hamburger { display: flex; }
    .pd-mainbar { min-height: 56px; padding: 0.5rem 1rem; }

    /* Shorten the logo lockup so it never has to fight the hamburger
       for space: smaller title, subtitle hidden entirely. */
    .pd-logo img { height: 100px; }
    .pd-logo__text { font-size: 1.05rem; }
    .pd-logo__text span { display: none; }
  }

  @media (max-width: 359px) {
    .pd-topbar { padding: 0 0.85rem; }
    .pd-mainbar { padding: 0.5rem 0.85rem; gap: 0.5rem; }
    .pd-logo { gap: 0.4rem; }
    .pd-logo img { height: 32px; }
    .pd-logo__text { font-size: 0.92rem; }
    .pd-topbar__phone span,
    .pd-topbar__phone { font-size: 0.8rem; }
  }

  @media (min-width: 768px) and (max-width: 1024px) {
    .pd-nav a { font-size: 0.88rem; padding: 0.4rem 0.45rem; }
    .pd-logo__text { font-size: 1.1rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    .pd-hamburger span,
    .pd-nav a,
    .pd-topbar__phone,
    .pd-topbar__socials a,
    .pd-header-cta,
    .pd-mobile-nav ul a,
    .pd-mobile-nav__cta {
      transition: none;
    }
  }
</style>

<script>
  (function () {
    var btn = document.querySelector('.pd-hamburger');
    var nav = document.getElementById('pd-mobile-nav');
    if (!btn || !nav) return;
    btn.addEventListener('click', function () {
      var isOpen = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!isOpen));
      nav.classList.toggle('is-open', !isOpen);
      if (isOpen) {
        nav.setAttribute('hidden', '');
      } else {
        nav.removeAttribute('hidden');
      }
    });
  })();
</script>
